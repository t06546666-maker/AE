<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate (AE)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/vendor/html5-qrcode/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef6ff;--surface:#ffffff;--card:#ffffff;--border:#bfd3ea;
  --accent:#5546e8;--accent2:#e32972;--success:#07834d;--warn:#b86600;--info:#087db5;--wa:#087f42;
  --text:#101c2c;--muted:#52657a;--radius:8px;
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:14px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e6f2ff}
.login-wrap{width:600px;max-width:95vw}
.login-logo{font-family:var(--fh);font-size:36px;font-weight:700;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-ae{text-align:center;font-size:12px;color:var(--muted);letter-spacing:.18em;font-weight:600;text-transform:uppercase;margin-bottom:44px}
.login-form{max-width:410px;margin:0 auto;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:26px}
.login-form .form-group{margin-bottom:15px}.login-form .card-btn{background:var(--accent);color:#fff;margin-top:6px}
.login-error{min-height:18px;color:var(--danger);font-size:12px;margin-top:12px;text-align:center}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.role-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;text-align:center;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.role-card:hover{transform:translateY(-3px)}
.admin-card:hover{border-color:var(--accent);box-shadow:0 16px 48px rgba(124,110,247,.2)}
.merchant-card:hover{border-color:var(--accent2);box-shadow:0 16px 48px rgba(232,77,138,.2)}
.card-glow{position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none}
.admin-card .card-glow{background:radial-gradient(ellipse at 50% 0%,rgba(124,110,247,.15) 0%,transparent 70%)}
.merchant-card .card-glow{background:radial-gradient(ellipse at 50% 0%,rgba(232,77,138,.15) 0%,transparent 70%)}
.role-card:hover .card-glow{opacity:1}
.card-icon{font-size:44px;margin-bottom:14px;display:block}
.card-title{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:8px}
.admin-card .card-title{color:var(--accent)}.merchant-card .card-title{color:var(--accent2)}
.card-desc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:22px}
.card-btn{display:block;width:100%;padding:11px;border:none;border-radius:10px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.admin-card .card-btn{background:linear-gradient(135deg,var(--accent),#5b4de0);color:#fff}
.merchant-card .card-btn{background:linear-gradient(135deg,var(--accent2),#b0246b);color:#fff}
.card-btn:hover{opacity:.88}
.card-perms{margin-top:18px;display:flex;flex-direction:column;gap:6px}
.perm{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);text-align:left}
.perm-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* STATUS BAR */
#api-status-bar{display:none;align-items:center;gap:10px;padding:7px 28px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.status-dot{display:inline-flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%}
.dot-on{background:var(--success);box-shadow:0 0 5px rgba(34,212,122,.5)}
.dot-off{background:var(--accent2)}.dot-loading{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* APP SHELL */
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:#ffffff;border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(30,73,118,.08);position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--fh);font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:12px}
.theme-toggle{width:32px;height:32px;display:grid;place-items:center;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:18px;line-height:1;cursor:pointer}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.role-badge{padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}
.badge-admin{background:rgba(124,110,247,.2);color:var(--accent)}
.badge-merchant{background:rgba(232,77,138,.2);color:var(--accent2)}
.logout-btn{padding:6px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--accent);color:var(--text)}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:4px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:6px}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all .25s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.sidebar-overlay.open{display:block}
.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:218px;min-width:218px;background:#f8fbff;border-right:1px solid var(--border);padding:22px 12px;display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .2s;user-select:none}
.nav-item:hover{background:#e7f1ff;color:var(--text)}
.nav-item.active{background:#dedbff;color:#3827c8}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-sep{height:1px;background:var(--border);margin:7px 0}
.main{flex:1;padding:30px 34px;overflow-y:auto}
.page-title{font-family:var(--fh);font-size:23px;font-weight:700;margin-bottom:5px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:26px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px;margin-bottom:26px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 5px 16px rgba(30,73,118,.08);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none}
.sg-purple::before{background:var(--accent)}.sg-pink::before{background:var(--accent2)}
.sg-green::before{background:var(--success)}.sg-blue::before{background:var(--info)}.sg-wa::before{background:var(--wa)}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.stat-val{font-family:var(--fh);font-size:26px;font-weight:700;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--muted)}
.cp{color:var(--accent)}.cpk{color:var(--accent2)}.cg{color:var(--success)}.cb{color:var(--info)}.cw{color:var(--wa)}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:0 5px 16px rgba(30,73,118,.07);margin-bottom:22px}
.panel-title{font-family:var(--fh);font-size:15px;font-weight:600;margin-bottom:16px}
.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
@media(max-width:920px){.panel-row{grid-template-columns:1fr}}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:108px;padding-top:6px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;position:relative;cursor:pointer}
.bar:hover .bar-tip{opacity:1}
.bar-tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#0d0d14;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;z-index:10;color:var(--text)}
.bar-label{font-size:9px;color:var(--muted);text-align:center;white-space:nowrap}
.dashboard-tools{display:flex;align-items:end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.period-tabs{display:flex;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:3px;gap:2px}
.period-tab{border:0;background:transparent;color:var(--muted);padding:7px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px}
.period-tab.active{background:var(--accent);color:#fff}
.report-heading{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.report-heading .panel-title{margin-bottom:0}
.period-tabs.compact .period-tab{padding:6px 9px;font-size:11px}
.date-range{display:flex;align-items:end;gap:8px;flex-wrap:wrap}
.date-range label{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700}
.date-range input{display:block;margin-top:4px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text)}
.metric-grid{grid-template-columns:repeat(4,minmax(150px,1fr))}
.scanner-shell{display:grid;grid-template-columns:minmax(260px,1fr) minmax(230px,.7fr);gap:18px}
.scanner-view{min-height:260px;border:1px dashed #aeb7c2;border-radius:8px;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scanner-actions{display:flex;gap:8px;margin-top:12px}
.scanner-message{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}
.grouped-chart{height:220px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:end;padding-top:24px}
.group-slot{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px}
.group-bars{height:170px;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:7px;border-bottom:1px solid var(--border)}
.group-bar{width:min(34%,38px);min-height:4px;border-radius:4px 4px 0 0;position:relative}
.group-bar:hover .bar-tip{opacity:1}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:12px}
.legend-swatch{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px}
.phone-input{display:flex;align-items:stretch}
.phone-prefix{display:flex;align-items:center;padding:0 12px;background:#eef1f5;border:1px solid var(--border);border-right:0;border-radius:7px 0 0 7px;font-weight:700;color:var(--text)}
.phone-input input{border-radius:0 7px 7px 0!important}
.amount-input{width:100%!important;min-height:58px!important;padding:13px 16px!important;font-size:22px!important;font-weight:800;border:2px solid var(--accent)!important;background:#f7f9ff!important}
.amount-input:focus{box-shadow:0 0 0 4px rgba(85,70,232,.14)}
.amount-col{min-width:130px}
.purchase-reward-row{display:grid;grid-template-columns:minmax(180px,1fr) minmax(130px,.55fr);gap:12px;align-items:end}
.reward-preview{margin-top:8px;min-height:38px;display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:9px 12px;border:1px solid #b8ddc8;border-radius:7px;background:#effbf4;color:var(--success);font-size:12px;font-weight:700}
.reward-preview strong{font-size:17px}
.amount-rule{margin-top:5px;color:var(--muted);font-size:11px}
body.dark .reward-preview{background:#14251c;border-color:#285c3d}
@media(max-width:560px){.purchase-reward-row{grid-template-columns:1fr}}
body.dark{--bg:#0d0d14;--surface:#15151f;--card:#1b1b27;--border:#303044;--accent:#7c6ef7;--accent2:#e84d8a;--success:#22b96f;--warn:#f0a11d;--info:#38a8d8;--wa:#25b864;--text:#f4f5fa;--muted:#a0a8b8}
body.dark #login-screen{background:#0d0d14}
body.dark .topbar{background:#15151f;box-shadow:0 2px 10px rgba(0,0,0,.28)}
body.dark .sidebar{background:#12121b}
body.dark .nav-item:hover{background:#222233}
body.dark .nav-item.active{background:#2a2548;color:#b6adff}
body.dark .date-range input,body.dark .form-group input,body.dark .form-group select{background:#15151f;color:var(--text)}
body.dark .scanner-view,body.dark #scan-checkout-panel>div{background:#12121b!important}
body.dark .phone-prefix{background:#222231}
body.dark .amount-input{background:#211f35!important}
@media(max-width:920px){.metric-grid{grid-template-columns:repeat(2,1fr)}.scanner-shell{grid-template-columns:1fr}}
@media(max-width:560px){.metric-grid{grid-template-columns:1fr 1fr}.date-range{width:100%}.date-range>div{flex:1}.date-range input{width:100%}.grouped-chart{gap:6px}.scanner-view{min-height:220px}}

/* RETENTION RING */
.ret-wrap{display:flex;align-items:center;gap:18px}
.ret-stats{display:flex;flex-direction:column;gap:9px}
.ret-row{display:flex;align-items:center;gap:8px;font-size:12px}
.ret-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ret-num{font-family:var(--fh);font-weight:700;font-size:14px;margin-left:auto}

/* MONTH ROWS */
.month-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,42,58,.4)}
.month-row:last-child{border-bottom:none}
.month-name{font-weight:600;font-size:12px;width:34px;flex-shrink:0}
.mbar-wrap{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.mbar{height:100%;border-radius:3px}
.month-cnt{font-size:11px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.month-amt{font-size:11px;font-weight:600;color:var(--success);width:60px;text-align:right;flex-shrink:0}

/* FEED */
.feed-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(42,42,58,.4)}
.feed-item:last-child{border-bottom:none}
.feed-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.feed-info{flex:1;min-width:0}
.feed-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-meta{font-size:11px;color:var(--muted);margin-top:1px}
.feed-right{text-align:right;flex-shrink:0}
.feed-amt{font-weight:700;font-size:13px;color:var(--success)}
.feed-time{font-size:10px;color:var(--muted);margin-top:2px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 13px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap;background:rgba(255,255,255,.015)}
tbody td{padding:11px 13px;border-bottom:1px solid rgba(42,42,58,.4);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.018)}
.order-num{font-family:var(--fh);font-weight:700;font-size:12px;color:var(--accent)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;margin-right:9px;flex-shrink:0}
.cell-name{display:flex;align-items:center}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tg{background:rgba(34,212,122,.12);color:var(--success)}
.tb{background:rgba(56,189,248,.12);color:var(--info)}
.tp{background:rgba(124,110,247,.14);color:var(--accent)}
.tw{background:rgba(37,211,102,.12);color:var(--wa)}
.te{background:rgba(232,77,138,.12);color:var(--accent2)}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:13px}
.customer-details-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px;align-items:end}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(85,70,232,.12)}
.btn-primary{padding:10px 22px;background:linear-gradient(135deg,var(--accent),#5b4de0);border:none;border-radius:9px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .2s;display:inline-flex;align-items:center;gap:7px}
.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-wa{padding:10px 22px;background:linear-gradient(135deg,#25d366,#128c4a);border:none;border-radius:9px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .2s}
.btn-wa:hover{opacity:.85}
.btn-ghost{padding:9px 18px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:13px;cursor:pointer}
.btn-danger{padding:5px 11px;background:rgba(232,77,138,.1);border:1px solid rgba(232,77,138,.28);border-radius:7px;color:var(--accent2);font-size:11px;font-weight:600;cursor:pointer}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* CUSTOMER CARDS */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.cust-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border-color .2s,transform .15s}
.cust-card:hover{border-color:rgba(124,110,247,.35);transform:translateY(-2px)}
.cust-top{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.cust-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.cust-name{font-family:var(--fh);font-size:14px;font-weight:700}
.cust-id{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px}
.cust-phone{font-size:11px;color:var(--muted);margin-top:1px}
.cust-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:13px}
.cs{background:var(--surface);border-radius:7px;padding:7px;text-align:center}
.cs-val{font-family:var(--fh);font-size:14px;font-weight:700}
.cs-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.cust-foot{display:flex;align-items:center;justify-content:space-between;gap:7px;flex-wrap:wrap}
.ret-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.chip-ret{background:rgba(37,211,102,.12);color:var(--wa)}
.chip-new{background:rgba(124,110,247,.12);color:var(--accent)}
.customer-breakdown{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:8px}
.breakdown-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;font-size:11px;color:var(--muted)}
.breakdown-row strong{color:var(--text);font-size:12px}
.merchant-profile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.merchant-profile-title{font-family:var(--fh);font-size:22px;font-weight:800}
.merchant-profile-sub{font-size:12px;color:var(--muted);margin-top:4px}
.profile-customer-row{display:grid;grid-template-columns:minmax(180px,1.4fr) repeat(3,minmax(90px,.7fr)) minmax(74px,.45fr);gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.profile-customer-row:last-child{border-bottom:none}
@media(max-width:760px){.profile-customer-row{grid-template-columns:1fr 1fr}.breakdown-row{grid-template-columns:1fr auto}.breakdown-row .btn-sm{grid-column:1/-1;justify-content:center}}

/* QR MODAL */

/* ── HELPERS ── */
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtTime(iso){const d=new Date(iso);return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtMonth(iso){return MONTHS[new Date(iso).getMonth()]}
function fmtPoints(value){const n=Number(value||0);return Number.isInteger(n)?String(n):n.toFixed(2)}
function today(){return new Date().toISOString()}
function inits(name){return name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}
function newOrderNo(){return 'AE-'+String(nextOnum++).padStart(4,'0')}
function newCid(){return 'C'+String(nextCid++).padStart(3,'0')}
function qrData(c){return JSON.stringify({id:c.id,name:c.name,phone:c.phone});}

/* ── QR ── */
function genQR(cid,size=130){
  const el=document.getElementById('qr-'+cid); if(!el)return; el.innerHTML='';
  const c=customers.find(x=>x.id===cid); if(!c)return;
  try{new QRCode(el,{text:qrData(c),width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}
  catch(e){el.innerHTML=`<div style="width:${size}px;height:${size}px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:9px;color:#333;border-radius:5px">QR</div>`;}
}
function genQRInto(containerId,data,size=130){
  const el=document.getElementById(containerId); if(!el)return; el.innerHTML='';
  try{new QRCode(el,{text:data,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}
  catch(e){el.innerHTML=`<div style="width:${size}px;height:${size}px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:9px;color:#333;border-radius:5px">QR</div>`;}
}

function downloadQR(cid){
  const c=customers.find(x=>x.id===cid); if(!c)return;
  const tmp=document.createElement('div');tmp.style.cssText='position:absolute;left:-9999px;top:0';document.body.appendChild(tmp);
  try{
    new QRCode(tmp,{text:qrData(c),width:280,height:280,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{const canvas=tmp.querySelector('canvas');if(canvas){const a=document.createElement('a');a.download='AE-QR-'+c.id+'.png';a.href=canvas.toDataURL('image/png');a.click();}document.body.removeChild(tmp);},200);
  }catch(e){document.body.removeChild(tmp);}
}

async function sendQRWA(cid,merchantId=null){
  const c=customers.find(x=>x.id===cid); if(!c)return;
  const targetMerchantId=merchantId||c.merchantId||(c.memberships&&c.memberships[0]?.merchantId);
  try{
    const r=await apiFetch('/api/send-qr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cid:c.id,merchantId:targetMerchantId})});
    const d=await r.json();
    if(!r.ok||!d.success)throw new Error(d.whatsapp?.error||d.error||'WhatsApp message failed');
    showToast(`QR sent to ${c.phone} via WhatsApp`,'success');
  }catch(error){showToast(error.message,'error');}
}

/* -- AUTH -- */
async function login(event){
  event.preventDefault();
  const btn=document.getElementById('login-btn');
  const errorEl=document.getElementById('login-error');
  btn.disabled=true;errorEl.textContent='';
  try{
    const response=await fetch(API+'/api/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:document.getElementById('login-email').value.trim(),
        password:document.getElementById('login-password').value
      })
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Sign in failed');
    accessToken=data.accessToken;
    localStorage.setItem('ae_access_token',accessToken);
    await enterApp(data.user);
  }catch(error){errorEl.textContent=error.message;}
  finally{btn.disabled=false;}
}
async function enterApp(user){
  currentUser=user;
  currentRole=user.role;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('api-status-bar').style.display='flex';
  document.getElementById('app').style.display='block';
  document.getElementById('role-badge').textContent=currentRole==='admin'?'Admin':'Merchant';
  document.getElementById('role-badge').className='role-badge '+(currentRole==='admin'?'badge-admin':'badge-merchant');
  document.getElementById('topbar-user').textContent=currentUser.full_name||currentUser.email;
  await loadServerData();
  checkApiStatus();renderSidebar();navigate('dashboard');
}
function logout(){
  stopQrScanner();
  accessToken='';
  localStorage.removeItem('ae_access_token');
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('api-status-bar').style.display='none';
  document.getElementById('app').style.display='none';
  closeSidebar();
}
async function restoreSession(){
  if(!accessToken)return;
  try{
    const response=await apiFetch('/api/auth/me');
    const data=await response.json();
    if(!response.ok)throw new Error(data.error);
    await enterApp(data.user);
  }catch{logout();}
}
async function loadServerData(){
  const [customerResponse,merchantResponse,orderResponse,rewardResponse]=await Promise.all([
    apiFetch('/api/customers'),apiFetch('/api/merchants'),apiFetch('/api/orders'),
    apiFetch('/api/settings/reward')
  ]);
  const customerData=await customerResponse.json();
  const merchantData=await merchantResponse.json();
  const orderData=await orderResponse.json();
  const rewardData=await rewardResponse.json();
  if(customerResponse.ok)customers=customerData.customers;
  if(merchantResponse.ok)merchants=merchantData.merchants;
  if(orderResponse.ok)orders=orderData.orders;
  if(rewardResponse.ok){
    globalRewardPct=rewardData.rewardPercentage;
    globalRewardMin=rewardData.rewardMinimum;
    rewardOptions=rewardData.rewardOptions;
  }
  if(currentRole==='merchant'&&merchants[0])currentUser.merchantName=merchants[0].name;
}

function dashboardRange(period=dashboardPeriod){
  const now=new Date();
  let from=new Date(now),to=new Date(now);
  if(period==='today'){
    from.setHours(0,0,0,0);to=new Date(from);to.setDate(to.getDate()+1);
  }else if(period==='week'){
    from.setHours(0,0,0,0);from.setDate(from.getDate()-((from.getDay()+6)%7));
    to=new Date(from);to.setDate(to.getDate()+7);
  }else if(period==='month'){
    from=new Date(now.getFullYear(),now.getMonth(),1);
    to=new Date(now.getFullYear(),now.getMonth()+1,1);
  }else{
    const fromInput=document.getElementById('dash-from')?.value;
    const toInput=document.getElementById('dash-to')?.value;
    if(!fromInput||!toInput)return null;
    from=new Date(fromInput+'T00:00:00');to=new Date(toInput+'T00:00:00');to.setDate(to.getDate()+1);
  }
  return{from:from.toISOString(),to:to.toISOString()};
}

function reportRange(kind){
  const period=kind==='chart'?chartPeriod:retentionPeriod;
  if(period!=='custom')return dashboardRange(period);
  const fromValue=kind==='chart'?chartCustomFrom:retentionCustomFrom;
  const toValue=kind==='chart'?chartCustomTo:retentionCustomTo;
  if(!fromValue||!toValue)return null;
  const from=new Date(fromValue+'T00:00:00');
  const to=new Date(toValue+'T00:00:00');to.setDate(to.getDate()+1);
  return{from:from.toISOString(),to:to.toISOString()};
}

async function setReportPeriod(kind,period){
  await stopQrScanner();

  else{retentionPeriod=period;retentionData=null;}
  document.getElementById('main-content').innerHTML=renderDashboard();

async function loadReportData(kind,renderVersion=pageRenderVersion){
  if(kind==='chart'){
    chartCustomFrom=document.querySelector('.panel-row .panel:first-child input[type="date"]')?.value||chartCustomFrom;
    const inputs=document.querySelectorAll('.panel-row .panel:first-child input[type="date"]');
    chartCustomTo=inputs.length>1?inputs[1].value:chartCustomTo;
  }else{
    const inputs=document.querySelectorAll('.panel-row .panel:nth-child(2) input[type="date"]');
    retentionCustomFrom=inputs.length?inputs[0].value:retentionCustomFrom;
    retentionCustomTo=inputs.length>1?inputs[1].value:retentionCustomTo;
  }
  const range=reportRange(kind);if(!range){showToast('Choose both dates','error');return;}
  try{
    const response=await apiFetch('/api/dashboard?from='+encodeURIComponent(range.from)+'&to='+encodeURIComponent(range.to));
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not load report');
    if(kind==='chart')chartData=data;else retentionData=data;
    if(currentPage!=='dashboard'||renderVersion!==pageRenderVersion)return;
    document.getElementById('main-content').innerHTML=renderDashboard();
  }catch(error){showToast(error.message,'error');}
}

async function loadDashboardData(renderVersion=pageRenderVersion){
  const range=dashboardRange();if(!range){showToast('Choose both dates','error');return;}
  try{
    const response=await apiFetch('/api/dashboard?from='+encodeURIComponent(range.from)+'&to='+encodeURIComponent(range.to));
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not load dashboard');
    dashboardData=data;
    if(!chartData)chartData=data;
    if(!retentionData)retentionData=data;
    if(currentPage!=='dashboard'||renderVersion!==pageRenderVersion)return;
    document.getElementById('main-content').innerHTML=renderDashboard();
  }catch(error){showToast(error.message,'error');}
}

async function startQrScanner(){
  const message=document.getElementById('scanner-message');
  if(!window.isSecureContext){message.textContent='Camera scanning needs HTTPS or localhost.';return;}
  if(typeof Html5Qrcode==='undefined'){message.textContent='QR scanner could not load.';return;}
  if(scannerRunning)return;
  scanBusy=false;
  const scanButton=document.getElementById('scanner-start');
  if(scanButton){scanButton.disabled=true;scanButton.textContent='Scanning...';}
  try{
    document.getElementById('qr-reader').innerHTML='';
    qrScanner=new Html5Qrcode('qr-reader',{
      formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE],
      verbose:false
    });
    await qrScanner.start(
      {facingMode:'environment'},
      {
        fps:20,
        qrbox:(width,height)=>{
          const size=Math.min(260,Math.floor(Math.min(width,height)*0.72));
          return{width:size,height:size};
        },
        experimentalFeatures:{useBarCodeDetectorIfSupported:true}
      },
      decoded=>handleQrDecoded(decoded),
      ()=>{}
    );
    scannerRunning=true;message.textContent='Point the camera at a RewardHub customer QR.';
  }catch(error){
    message.textContent='Camera access was denied or no camera is available.';
    if(scanButton){scanButton.disabled=false;scanButton.textContent='Scan QR';}
  }
}

async function stopQrScanner(){
  if(qrScanner&&scannerRunning){try{await qrScanner.stop();}catch{}}
  scannerRunning=false;qrScanner=null;
  const scanButton=document.getElementById('scanner-start');
  if(scanButton){scanButton.disabled=false;scanButton.textContent='Scan QR';}
}

async function handleQrDecoded(decoded){
  if(scannedCustomer||scanBusy)return;
  let payload;
  try{payload=JSON.parse(decoded);}catch{document.getElementById('scanner-message').textContent='Invalid RewardHub QR.';return;}
  if(!payload?.id){document.getElementById('scanner-message').textContent='Customer ID is missing from the QR.';return;}
  scanBusy=true;
  document.getElementById('scanner-message').textContent='QR found. Loading customer...';
  try{
    const [response]=await Promise.all([
      apiFetch('/api/customers/scan/'+encodeURIComponent(payload.id)),
      stopQrScanner()
    ]);
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Customer not found');
    scannedCustomer=data.customer;
    document.getElementById('scanner-message').textContent='Customer verified.';
    document.getElementById('scan-checkout-panel').innerHTML=`
      <div class="panel" style="margin:0">
        <div class="panel-title">${scannedCustomer.name}</div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:14px">${formatIndianPhone(scannedCustomer.phone)} · ${scannedCustomer.id}</div>
        ${scannedCustomer.isNewToMerchant?'<div class="tag tb" style="margin-bottom:12px">New merchant connection</div>':''}
        <div style="font-size:12px;margin-bottom:16px">Current balance: <strong>${scannedCustomer.rewardPoints} points</strong></div>
        <div class="purchase-reward-row">
          <div class="form-group"><label>Purchase Amount (₹)</label><input class="amount-input" id="scan-amount" type="number" min="100" step="0.01" oninput="calculateRewardPreview('scan-amount','scan-reward-pct','scan-reward-preview')"><div class="amount-rule">Minimum purchase ₹100</div></div>
          <div class="form-group"><label>Reward Percentage</label>${rewardDropdown('scan-reward-pct',"calculateRewardPreview('scan-amount','scan-reward-pct','scan-reward-preview')")}</div>
        </div>
        <div class="reward-preview" id="scan-reward-preview"><strong>0.00 points</strong></div>
        <button class="btn-primary" onclick="completeScannedCheckout(this)" style="width:100%;justify-content:center">Complete checkout</button>
      </div>`;
  }catch(error){
    scanBusy=false;
    document.getElementById('scanner-message').textContent=error.message;
  }
}

async function completeScannedCheckout(button){
  const amount=Number(document.getElementById('scan-amount').value);
  const rewardPercentage=Number(document.getElementById('scan-reward-pct').value);
  if(!Number.isFinite(amount)||amount<100){showToast('Minimum purchase amount is ₹100','error');return;}
  button.disabled=true;button.textContent='Processing...';
  try{
    const response=await apiFetch('/api/checkouts',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({customerCode:scannedCustomer.id,amount,rewardPercentage,location:'In-store'})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Checkout failed');
    showToast(`Checkout saved · ${data.purchase.points_earned} points issued`,'success');
    scannedCustomer=null;dashboardData=null;await loadServerData();
    document.getElementById('main-content').innerHTML=renderDashboard();await loadDashboardData();
  }catch(error){showToast(error.message,'error');button.disabled=false;button.textContent='Complete checkout';}
}

function formatIndianPhone(value){
  const digits=String(value||'').replace(/\D/g,'').slice(-10);
  return digits.length===10?`+91 ${digits.slice(0,5)} ${digits.slice(5)}`:value;
}

async function openMerchantProfile(id){
  selectedMerchantProfile={loading:true,merchant:merchants.find(m=>String(m.id)===String(id))||{name:'Merchant'}};
  currentPage='merchant-detail';pageRenderVersion++;renderSidebar();renderPage('merchant-detail');window.scrollTo(0,0);
  try{
    const response=await apiFetch('/api/merchants/'+encodeURIComponent(id)+'/summary');
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not load merchant profile');
    selectedMerchantProfile=data;
    if(currentPage==='merchant-detail')renderPage('merchant-detail');
  }catch(error){
    selectedMerchantProfile={error:error.message,merchant:selectedMerchantProfile.merchant};
    if(currentPage==='merchant-detail')renderPage('merchant-detail');
  }
}

async function addMerchant(){
  const name=document.getElementById('nm-name').value.trim();
  const email=document.getElementById('nm-email').value.trim();
  const phone=document.getElementById('nm-phone').value.trim();
  const password=document.getElementById('nm-password').value;
  if(!name||!email||!phone||password.length<8){showToast('Fill all fields and use an 8+ character password','error');return;}
  try{
    const response=await apiFetch('/api/merchants',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,phone,password})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not create merchant');
    await loadServerData();showToast('Merchant login created!');renderPage('merchants');
  }catch(error){showToast(error.message,'error');}
}
async function delMerchant(id){
  const merchant=merchants.find(m=>String(m.id)===String(id));
  const label=merchant?.name||'this merchant';
  try{
    const response=await apiFetch('/api/merchants/'+encodeURIComponent(id),{method:'DELETE'});
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not remove merchant');
    selectedMerchantProfile=null;dashboardData=null;
    await loadServerData();
    showToast(data.deletedCustomers?`Merchant removed. ${data.deletedCustomers} customer record(s) also removed.`:'Merchant removed','success');
    renderPage('merchants');
  }catch(error){showToast(error.message,'error');}
}

async function delCustomer(id,name='Customer'){
  if(currentRole!=='admin')return;
  if(!confirm(`Delete ${name} fully?\n\nClick OK to delete this selected customer, including their orders, reward balance, QR links, and WhatsApp message logs.`))return;
  try{
    const response=await apiFetch('/api/customers/'+encodeURIComponent(id),{method:'DELETE'});
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not delete customer');
    selectedMerchantProfile=null;dashboardData=null;
    await loadServerData();
    showToast('Customer deleted fully','success');
    renderPage(currentPage==='merchant-detail'?'merchants':'customers');
  }catch(error){showToast(error.message,'error');}
}

  const list=document.getElementById('admin-list');if(!list)return;
  try{
    const response=await apiFetch('/api/admins');
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not load administrators');
    list.innerHTML=data.admins.map(admin=>`<tr>
      <td><strong>${admin.fullName}</strong>${admin.isCurrent?' <span class="tag tp">You</span>':''}</td>
      <td style="color:var(--muted);font-size:12px">${admin.email}</td>
      <td style="color:var(--muted);font-size:11px">${fmtDate(admin.createdAt)}</td>
      <td>${admin.isCurrent?'':`<button class="btn-danger" onclick="removeAdministrator('${admin.id}')">Remove</button>`}</td>
    </tr>`).join('');
  }catch(error){
    list.innerHTML=`<tr><td colspan="4" style="text-align:center;color:var(--danger)">${error.message}</td></tr>`;
  }

async function addAdministrator(button){
  const fullName=document.getElementById('na-name').value.trim();
  const email=document.getElementById('na-email').value.trim();
  const password=document.getElementById('na-password').value;
  if(!fullName||!email||password.length<8){
    showToast('Enter a name, email, and an 8+ character password','error');return;
  }
  button.disabled=true;
  try{
    const response=await apiFetch('/api/admins',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fullName,email,password})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not create administrator');
    showToast('Administrator account created','success');
    renderPage('administrators');
  }catch(error){showToast(error.message,'error');button.disabled=false;}
}

async function removeAdministrator(id){
  try{
    const response=await apiFetch('/api/admins/'+encodeURIComponent(id),{method:'DELETE'});
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not remove administrator');
    showToast('Administrator removed','success');loadAdministrators();
  }catch(error){showToast(error.message,'error');}
}

async function saveRewardSetting(button){
  button.disabled=true;
  const original=button.textContent;
  button.textContent='Saving...';
  try{
    const response=await apiFetch('/api/settings/reward',{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rewardPercentage:globalRewardPct,rewardMinimum:globalRewardMin})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'Could not save reward setting');
    globalRewardPct=data.rewardPercentage;
    globalRewardMin=data.rewardMinimum;
    rewardOptions=data.rewardOptions;
    showToast('Reward settings saved','success');
    renderPage('reward-settings');
  }catch(error){
    showToast(error.message,'error');
    button.disabled=false;
    button.textContent=original;
  }
}
